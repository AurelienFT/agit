# Agit runner — GitHub Actions trigger
#
# This workflow does NOT invoke any model and does NOT hold any API key.
# Trust model:
#   - GitHub Actions never sees an Anthropic key.
#   - Claude Code runs on YOUR machine, with YOUR authentication.
#   - Anthropic's terms apply to your local Claude Code usage just like any
#     other interactive session.
#
# What this workflow does:
#   1. Validates `.agit/agents.yaml` using agit-cli.
#   2. Confirms the label maps to a declared agent.
#   3. Posts a comment on the issue with the exact command to run locally:
#         ./scripts/agit-run <issue-number>
#
# The actual agent run is done by `scripts/agit-run` on your laptop / server.

name: agit-runner

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

concurrency:
  group: agit-runner-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: startsWith(github.event.label.name, 'agit:')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build agit-cli
        run: cargo build --release -p agit-cli

      - name: Validate .agit/agents.yaml
        run: ./target/release/agit validate

      - name: Resolve label → agent
        id: agent
        env:
          LABEL: ${{ github.event.label.name }}
        run: |
          case "$LABEL" in
            agit:test)    name=test_writer ;;
            agit:doc)     name=doc_updater ;;
            agit:feature) name=feature_engineer ;;
            *)            name="" ;;
          esac
          echo "name=$name" >> "$GITHUB_OUTPUT"
          if [ -z "$name" ]; then
            echo "::warning::Label '$LABEL' is not mapped to an Agit agent."
          else
            echo "Resolved: $LABEL → $name"
          fi

      - name: Confirm agent is declared
        if: steps.agent.outputs.name != ''
        env:
          AGENT: ${{ steps.agent.outputs.name }}
        run: ./target/release/agit show "$AGENT" > /dev/null

      - name: Comment on issue with run instructions
        if: steps.agent.outputs.name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
          AGENT: ${{ steps.agent.outputs.name }}
        run: |
          gh issue comment "$ISSUE" --body "$(cat <<EOF
          Agit picked up this issue → agent \`$AGENT\`.

          Run it **locally** on a machine where \`claude\` is installed and authenticated:

          \`\`\`bash
          git pull
          ./scripts/agit-run $ISSUE
          \`\`\`

          The agent runs through your local Claude Code (no API key, no Anthropic
          credential transits through GitHub). When it finishes and the policy
          check passes, a PR will be opened back at you.

          See \`CONTRIBUTING.md\` for the full workflow and \`SETUP.md\` for
          one-time setup.
          EOF
          )"

      - name: Comment on issue when label is unmapped
        if: steps.agent.outputs.name == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
          LABEL: ${{ github.event.label.name }}
        run: |
          gh issue comment "$ISSUE" --body \
            "Label \`$LABEL\` matches the \`agit:*\` prefix but no agent is mapped to it. Known labels: \`agit:test\`, \`agit:doc\`, \`agit:feature\`."

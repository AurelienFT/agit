# Agit running on Agit itself.
#
# Four agents — three developers and one reviewer — drive the dev workflow:
#
#   issue agit:test     → test_writer       opens PR
#   issue agit:doc      → doc_updater       opens PR
#   issue agit:feature  → feature_engineer  opens PR
#                           │ (auto-adds PR label agit:review,
#                           │  unless the issue carries agit:human-review)
#                           ▼
#                         PR agit:review → reviewer
#                           ├─ approve → gh pr review --approve + gh pr merge
#                           └─ changes → gh pr review --request-changes
#                                         + adds PR label agit:retry
#                           ▼
#                         PR agit:retry → original developer (resolved via
#                                         branch name agit/<slug>/issue-N).
#                                         Pushes fixes, re-adds agit:review.
#                                         Loops until reviewer approves.

version: "1"

project:
  name: "agit"

providers:
  claude_code:
    type: "local_command"
    command: "claude"
    mode: "workspace"

agents:

  # ─── test_writer ──────────────────────────────────────────────────────────
  test_writer:
    description: "Adds Rust tests (unit or integration) when an issue is labeled agit:test."
    provider: "claude_code"
    prompt: ".agit/prompts/test_writer.md"

    trigger:
      type: "github_issue_label"
      label: "agit:test"

    permissions:
      read:
        - "**"
      write:
        # Integration tests (preferred) live under crates/<crate>/tests/.
        - "crates/*/tests/**"
        # Inline unit tests inside #[cfg(test)] mod blocks live in src/.
        - "crates/*/src/**/*.rs"
        # Test-only deps may need to be added.
        - "crates/*/Cargo.toml"
      commands:
        allow:
          - "cargo test"
          - "cargo check"
          - "cargo fmt --check"

    output:
      type: "pull_request"
      branch_prefix: "agit/test-writer/"
      require_human_review: true

    limits:
      max_iterations: 5
      max_files_changed: 10
      max_cost_usd: 2.00

  # ─── doc_updater ──────────────────────────────────────────────────────────
  doc_updater:
    description: "Updates Markdown documentation when an issue is labeled agit:doc."
    provider: "claude_code"
    prompt: ".agit/prompts/doc_updater.md"

    trigger:
      type: "github_issue_label"
      label: "agit:doc"

    permissions:
      read:
        - "**"
      write:
        - "**/*.md"
        - "docs/**"
      commands:
        allow: []   # docs work needs no shell commands

    output:
      type: "pull_request"
      branch_prefix: "agit/doc-updater/"
      require_human_review: true

    limits:
      max_iterations: 4
      max_files_changed: 8
      max_cost_usd: 1.00

  # ─── feature_engineer ─────────────────────────────────────────────────────
  # Wider permissions — this is the agent meant to implement code features.
  # Still locked out of secrets and the GHA workflow. Cargo.lock is allowed:
  # adding a dependency is legitimate feature work, and the lock change is the
  # mechanical consequence of an allowed Cargo.toml edit.
  feature_engineer:
    description: "Implements small features in crates/ when an issue is labeled agit:feature."
    provider: "claude_code"
    prompt: ".agit/prompts/feature_engineer.md"

    trigger:
      type: "github_issue_label"
      label: "agit:feature"

    permissions:
      read:
        - "**"
      write:
        - "crates/**/src/**"
        - "crates/**/tests/**"
        - "crates/**/Cargo.toml"
        - "Cargo.toml"
        - "Cargo.lock"
      commands:
        allow:
          - "cargo build"
          - "cargo test"
          - "cargo check"
          - "cargo fmt --check"
          - "cargo clippy"

    output:
      type: "pull_request"
      branch_prefix: "agit/feature/"
      require_human_review: true

    limits:
      max_iterations: 10
      max_files_changed: 20
      max_cost_usd: 5.00

  # ─── reviewer ─────────────────────────────────────────────────────────────
  # Triggered when a PR carries the agit:review label. The label is added
  # automatically by the developer agents after they open their PR, unless
  # the parent issue carries agit:human-review (which opts out of agentic
  # review entirely).
  #
  # The reviewer never modifies code. It reads, runs the toolchain checks,
  # and either approves+merges or requests changes (which adds agit:retry
  # to the PR, looping back to the original developer).
  reviewer:
    description: "Reviews PRs opened by other Agit agents and either approves+merges or requests changes."
    provider: "claude_code"
    prompt: ".agit/prompts/reviewer.md"

    trigger:
      type: "github_pull_request_label"
      label: "agit:review"

    permissions:
      read:
        - "**"
      write: []
      commands:
        allow:
          - "cargo test"
          - "cargo check"
          - "cargo clippy"
          - "cargo fmt --check"

    # The reviewer's verdict drives a `gh pr review` + (on approve) `gh pr merge`,
    # or (on changes) a `agit:retry` label add. The `blocking_review` output kind
    # captures the "this is a review, not new code" semantics; the script does
    # the dispatch.
    output:
      type: "blocking_review"
      require_human_review: false

    limits:
      max_iterations: 5
      max_files_changed: 0
      max_cost_usd: 2.00
